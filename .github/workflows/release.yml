name: Release Binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            name: vibecheck-linux-x64
          - target: bun-linux-arm64
            name: vibecheck-linux-arm64
          - target: bun-darwin-x64
            name: vibecheck-darwin-x64
          - target: bun-darwin-arm64
            name: vibecheck-darwin-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: npm ci
      - run: npm run build
      - run: bun build dist/cli.js --compile --minify --target=${{ matrix.target }} --outfile ${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - run: chmod +x vibecheck-*

      - uses: softprops/action-gh-release@v2
        with:
          files: vibecheck-*
          generate_release_notes: true
